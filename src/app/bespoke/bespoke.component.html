<div class="bespoke-container">
    <mat-tab-group
            class="bespoke-controls"
            mat-stretch-tabs="false"
            mat-align-tabs="start">
        <mat-tab>
            <ng-template mat-tab-label>
                <mat-icon class="material-symbols-outlined">graph_1</mat-icon>
            </ng-template>
            <div class="graph">
                Stuff
            </div>
        </mat-tab>
        <mat-tab>
            <ng-template mat-tab-label>
                <mat-icon>design_services</mat-icon>
            </ng-template>
            <div class="tools">and</div>
        </mat-tab>
        <mat-tab>
            <ng-template mat-tab-label>
                <mat-icon>list</mat-icon>
            </ng-template>
            <div class="list">
                <mat-card appearance="outlined">
                    <mat-card-header>Object</mat-card-header>
                </mat-card>
            </div>
        </mat-tab>
    </mat-tab-group>
    <mat-divider vertical></mat-divider>
    <div #render_container
         class="render-container"
         (resize)="onResize()">
    </div>
</div>
